_target_: src.algorithms.avoidance.AStarAvoidance.AStarAvoidance
name: "A* Local Planner"
enable: true

# --- Budżet czasowy manewru ---
# Cały manewr uniku (od wykrycia do osiągnięcia rejoin-pointu) ma zmieścić się
# w przedziale [evasion_time_min, evasion_time_max]. Ograniczenie budżetu
# dyktuje wielkość lokalnego bounding boxa, w którym A* szuka trasy.
evasion_time_min: 2.0
evasion_time_max: 4.0

# --- Dyskretyzacja A* ---
grid_resolution: 0.5        # [m] - większa niż poprzednio: szybciej, bo przestrzeń mała
margin_multiplier: 1.8      # mnożnik promienia przeszkody dla bezpiecznego obejścia
max_search_depth: 2500      # sanity check na długość przeszukiwania

# --- Heurystyka preferencji kierunku ---
# Kolejność preferencji osi uniku. Algorytm sprawdza przestrzeń w każdej osi
# i wybiera pierwszą "bezpieczną" (tzn. mającą dość swobody na manewr).
# Wartości: "up", "down", "right", "left"
prefer_axis_order: ["up", "down", "right", "left"]

# Mnożniki kosztu w A* faworyzujące wybrany kierunek uniku.
# Ruch zgodny z preferred_dir → koszt * 1.0
# Ruch przeciwny do preferred_dir → koszt * bias_oppose
# Ruch boczny (prostopadły) → koszt * bias_perpendicular
bias_preferred: 1.0
bias_perpendicular: 1.4
bias_oppose: 2.5

# --- Ograniczenia geometryczne świata ---
# Podłogę i sufit algorytm bierze z ForestWorld.track_height, ale trzyma marginesy
floor_safe_margin: 1.0      # ile [m] nad podłogą (ground_position + margin)
ceiling_safe_margin: 1.0    # ile [m] pod sufitem (track_height - margin)

# --- Minimum/maksimum waypointów po downsampling ---
# Douglas-Peucker z dopasowanym epsilon daje "łamaną" zachowującą kształt
# przy minimum punktów (typowo 3-5).
min_waypoints: 4
max_waypoints: 8
douglas_peucker_epsilon_m: 0.6

# --- Rejoin (powrót na oryginalną trasę) ---
# Dystans (mierzony po łuku oryginalnej trasy) od wykrycia przeszkody, za którym
# algorytm próbuje wrócić na starą trajektorię. Im większy, tym łagodniejszy
# powrót, ale dłuższe odchylenie.
rejoin_arc_distance_m: 8.0

# Tolerancja bliskości do rejoin-pointu, po której następuje przełączenie
# z trybu REJOIN w tryb TRACKING (na oryginalnej trajektorii).
rejoin_switch_radius_m: 1.5

# --- Prędkość w trybie uniku ---
# Nie wymuszamy stałej prędkości - nowy spline dziedziczy cruise_speed/max_accel
# z oryginalnej trajektorii. Opcjonalny mnożnik pozwala spowolnić manewr.
evasion_speed_multiplier: 0.85

# --- Wizualizacja ---
visualize: true
