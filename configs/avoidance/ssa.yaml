# Online avoidance: SSA (Sparrow Search Algorithm) z mealpy.
#
# Architektura: GenericOptimizingAvoidance komponuje 4 sub-strategie:
#   predictor: ConstantVelocityPredictor          (liniowa ekstrapolacja przeszkody)
#   path_representation: BSplineYZGenes           (geny YZ → BSpline 3D)
#   fitness: WeightedSumFitness                   (safety + energy + jerk + symmetry)
#   optimizer: MealpyOptimizer + algorithm_factory: mealpy.swarm_based.SSA.OriginalSSA
#
# Kontrakt budżetu: time_budget_s przekazywany do mealpy `termination={"max_time"}`.
# Hard-kill SIGALRM (× hard_kill_factor) jako outer circuit breaker.
#
# Reference: Xue & Shen (2020), "A novel swarm intelligence optimization approach:
#   sparrow search algorithm", Systems Science & Control Engineering.

_target_: src.algorithms.avoidance.GenericOptimizingAvoidance.GenericOptimizingAvoidance
name: "ssa"
enable: true

# === Twardy budżet czasu ====================================================
time_budget_s: 0.5
hard_kill_factor: 1.0

# === Sub-strategie (Hydra `_target_` + `instantiate` rekursywnie) ===========

predictor:
  _target_: src.algorithms.avoidance.predictors.ConstantVelocityPredictor.ConstantVelocityPredictor

path_representation:
  _target_: src.algorithms.avoidance.path.SingleArcDeflection.SingleArcDeflection
  # Refactor 2026-05-02: gene_dim = 2 (magnitude, peak_position). Geometryczny
  # single-hump shape — zigzag niemożliwy. AxisChooser wybiera deterministycznie
  # przed search'em. Zob. plan.md "Single-Arc Deflection".
  magnitude_min_m: 0.8
  magnitude_max_m: 4.0
  peak_position_min: 0.3
  peak_position_max: 0.7
  evasion_speed_multiplier: 0.85
  floor_safe_margin_m: 1.0
  ceiling_safe_margin_m: 1.0
  min_applied_cruise_ratio: 0.4  # zrelaksowane z 0.6 (single-arc ma niskie κ z założenia)
  axis_chooser:
    _target_: src.algorithms.avoidance.path.AxisChooser.AxisChooser
    w_clearance: 1.0
    w_anti_threat: 1.0
    w_secondary_blocking: 0.5
    sticky_hint_threshold: 0.7
    secondary_block_cone_deg: 20.0
    secondary_block_range_m: 10.0

fitness:
  _target_: src.algorithms.avoidance.fitness.WeightedSumFitness.WeightedSumFitness
  # Wagi — kalibracja zgrubna; finalne dostroje w eksperymentach.
  # Skalowanie: c_safety ~ O(1) gdy violation~1m, c_energy ~ O(1e2),
  # c_jerk ~ O(10), c_symmetry ~ O(1). Wagi ustawiamy by każdy składnik
  # miał porównywalny wkład rzędu O(10..100) gdy ścieżka jest "marginalnie zła".
  w_safety: 50.0
  w_energy: 0.5
  w_jerk: 0.1
  w_symmetry: 1.0
  safe_clearance_m: 1.5        # bufor ponad obstacle_state.radius
  n_samples: 32                # punkty próbkowania spline (więcej = dokładniej, drożej)

optimizer:
  _target_: src.algorithms.avoidance.optimizers.MealpyOptimizer.MealpyOptimizer
  n_inner_waypoints: 5         # legacy field; SingleArcDeflection ignoruje
  # Fixed wall-time fairness (2026-05-03): epoch ustawiony tak wysoko że
  # `max_time = time_budget_s` ZAWSZE binding constraint. Daje uczciwe
  # porównanie 4 algorytmów (każdy dostaje DOKŁADNIE `time_budget_s` compute).
  # Standard w online optimization papers (Mehdi 2017, Bing 2018).
  epoch: 10000                 # effectively unreachable; max_time wins
  pop_size: 12                 # ujednolicone między 4 algorytmami (Krok 2 fairness 2026-05-03)
  min_compute_time_s: 0.05
  rng: 42                      # reproducibility (Krok 3 fairness); per-run override przez Hydra CLI
  algorithm_factory:
    _target_: mealpy.swarm_based.SSA.OriginalSSA
    _partial_: true            # Hydra zwraca partial(OriginalSSA), MealpyOptimizer woła z (epoch, pop_size, **kwargs)
  algorithm_kwargs:
    # Parametry biologiczne SSA (Xue & Shen 2020):
    #   ST ∈ [0.5, 1.0]: safety threshold; R2 < ST ⇒ producer wide-search.
    #   PD ∈ (0, 1)    : udział producentów (paper: 0.2 = 20%).
    #   SD ∈ (0, 1)    : udział "świadomych zagrożenia" (paper: 0.1 = 10%).
    ST: 0.8
    PD: 0.2
    SD: 0.1

# === Pola czytane przez TrajectoryFollowingAlgorithm i EvasionContextBuilder ===
# (przechodzą do `self.params` przez `BaseAvoidance.__init__(**kwargs)`).

evasion_time_min: 1.2
evasion_time_max: 3.0

trigger_ttc: 3.5
trigger_distance_base: 6.0
trigger_distance_ttc_factor: 1.0
critical_distance_base: 25.0
critical_distance_ttc_factor: 1.5
forward_cone_cos: 0.5

margin_velocity_gain: 0.05
floor_safe_margin: 1.0
ceiling_safe_margin: 1.0

rejoin_arc_distance_m: 8.0
rejoin_flyby_safety_m: 3.0
rejoin_switch_radius_m: 1.5

blend_duration: 0.6

# Refactor 2026-05-02: cooldown po `compute_evasion_plan → None`
# (zapobiega re-trigger storm 100×/s gdy aktualnie infeasible).
no_plan_cooldown_s: 0.5
