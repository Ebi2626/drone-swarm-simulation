defaults:
  - _self_
  - environment: forest
  - optimizer: ssa
  - avoidance: none

simulation:
  duration_sec: 180
  gui: False
  pyb_freq: 240
  ctrl_freq: 48
  drone_model: "CF2X"
  physics: "PYB"
  sim_speed_multiplier: 10.0
  dynamic_obstacles: False
  collision_radius: 2.0
  # Liczba próbek wynikowej (dense) trajektorii podawanej kontrolerowi
  # `TrajectoryFollowingAlgorithm`. NIE mylić z `optimizer.algorithm_params.
  # n_inner_waypoints` — ta jest liczbą wewnętrznych węzłów kontrolnych
  # B-Spline (zmiennych decyzyjnych optymalizatora). Tu dostajemy gęsto
  # próbkowaną krzywą po post-processingu, żeby PID drona miał wystarczającą
  # rozdzielczość czasową (patrz plan.md, Krok 4).
  dense_samples: 200

seed: 43
experiment_name: "test_run"
debug: true
logging:
  enabled: true
  log_freq: 1.0

visualization:
  camera_follow: true
  tracked_drone_id: 0
  camera_distance: 1.0
  camera_yaw: -15.0
  camera_pitch: -30.0
  show_lidar_rays: false
  lidar_draw_interval: 5

hydra:
  run:
    dir: results/${now:%Y-%m-%d}/${now:%H-%M-%S}_${environment.name}_${hydra:runtime.choices.optimizer}
  job_logging:
    version: 1
    root:
      level: INFO
