_target_: src.algorithms.abstraction.trajectory.strategies.msffoa_strategy.msffoa_strategy
_partial_: true
_convert_: "all"


algorithm_params:
  cruise_speed: 6.0
  # epochs skalibrowane empirycznie (exp_20260506): Q75 konwergencji przy
  # iteracji 56 (~112k NFE). epochs=100 daje ~200k NFE = 1.8× margines.
  pop_size: 1001
  epochs: 100
  n_inner_waypoints: 11

  # --- Wagi celów (skalaryzacja MOO → SOO dla 5 funkcji kosztu) ---
  # Wektor F pochodzi z VectorizedEvaluator.evaluate i posiada 5 składowych:
  #   weights[0] → F[0] = f_1 (trajectory) : długość + kształt. 
  #   weights[1] → F[1] = f_2 (height) : odchylenia wys. + ostre wznoszenia.
  #   weights[2] → F[2] = f_3 (threat) : penetracja zagrożeń.
  #   weights[3] → F[3] = f_4 (turn_cost) : gładkość trasy w XY (ostre zakręty).
  #   weights[4] → F[4] = f_5 (coordination) : bliskość dronów (miękka kara za ścisk).
  objective_weights: [0.05, 0.5, 0.8, 1.0, 0.25]

  # --- VectorizedEvaluator (ograniczenia kinematyczne / separacja / kolizje) ---
  # Nazwy zgodne z odczytami w objective_constrains.VectorizedEvaluator.
  obstacle_safety_margin: 1.0     # bufor wokół przeszkód [m]
  min_drone_distance: 2.0         # min. odległość inter-drone na węzłach kontrolnych [m]
  k_factor: 2.0                   # mnożnik dynamicznego limitu dystansu między węzłami
  absolute_min_node_dist: 2.0     # dolny próg dystansu między węzłami [m] (zgodnie z OOA)
  max_accel_limit: 2.0            # limit „drugiej różnicy” wielokąta kontrolnego


  # --- Constraint penalty ---
  # Weakest-link: the worst single constraint violation (np.max, not np.sum)
  # is multiplied by this weight. High value enforces feasibility.
  # Ujednolicone z OOA (2.0), by warunki porównania ceteris paribus były spełnione.
  penalty_weight: 2.0

  # --- MSFOA-specific hyperparameters (Shi et al., 2020) ---
  # Eksponowane jako pola yaml, by można było przesterować z CLI bez
  # konieczności użycia prefiksu „+" (Hydra struct-mode wymaga deklaracji
  # klucza w config). Defaults pokrywają się z paperem (z udokumentowanymi
  # adaptacjami w docstringu MSFFOAOptimizer).
  n_swarms: 5                 # G — liczba podrojów (sub-swarms)
  coe1: 0.8                   # waga lidera w Eq. 14 (offspring competition)
  coe2: 0.2                   # waga aktualnej muchy w Eq. 14 (coe1 + coe2 = 1)
  threshold_ratio: 0.18       # próg fitness do przełączenia faza global ↔ 
                              # (dynamicznie skalowany przez initial_fitness)

  # --- Amplitudy perturbacji (paper Sec. 1: R jako parametr) ---
  # Frakcja zakresu świata na każdą oś [X, Y, Z]. Krok mnożony przez
  # `world_size = upper_bound - lower_bound` z SwarmOptimizationProblem.
  # Anizotropia (różne wartości per oś) to świadoma adaptacja vs paper —
  # dla świata 60×600×11m izotropia powodowałaby albo zbyt małe kroki Y,
  # albo zbyt duże kroki Z. Patrz docstring MSFFOAOptimizer.
  #
  # Defaults dobrane empirycznie (grid-search forest, plan.md):
  #   - paperowe ~10% (tj. [0.10, 0.10, 0.05]) generują kandydatów ~200×
  #     gorszych od liderów na fitness landscape zdominowanym przez
  #     F_smoothness → algorytm „utyka" bez postępu.
  #   - 1% XY / 0.5% Z (poniżej) daje monotoniczną zbieżność porównywalną
  #     z OOA na forest.
  step_global_frac: [0.040, 0.010, 0.005]    # faza globalna: x_best + sin(2·rand) · world_size · frac
  step_local_frac:  [0.003, 0.001, 0.001]    # faza lokalna:  x_best + rand · world_size · frac

  # --- Szum inicjalizacji populacji (anizotropowy) ---
  # Zakres Z (start ↔ cel) w typowych scenariuszach jest rzędu pojedynczych
  # metrów; izotropowy szum (σ=2m) zepchnąłby populację Z na dolny limit
  # po klipowaniu — stąd osobne σ_z.
  noise_std_xy: 7.0
  noise_std_z: 1.5

  preferred_height: 5.0                # f_2: preferowana stała wysokość lotu [m]
  coordination_penalty_factor: 1.5      # f_5: mnożnik wykładniczej kary za koordynację