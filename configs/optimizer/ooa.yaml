_target_: src.algorithms.abstraction.trajectory.strategies.osprey_swarm_strategy.osprey_swarm_strategy
_partial_: true
_convert_: "all"

# Parametry specyficzne dla Osprey Optimization Algorithm (OOA)
algorithm_params:
  pop_size: 500
  n_gen: 300
  n_inner_waypoints: 7
  seed: 1

  # --- Multithreading ---
  # mealpy wymusza ewaluacje per-osobnik (obj_func);
  # n_workers > 1 aktywuje tryb "thread" (ThreadPoolExecutor).
  # NumPy zwalnia GIL, wiec watki daja realne przyspieszenie.
  # UWAGA: OriginalOOA w mealpy 3.x wymusza tryb "single" –
  #   parametr n_workers jest ignorowany przez ten algorytm.
  #   Wartosc jest zachowana, poniewaz inne algorytmy mealpy (np. PSO, GA)
  #   moga korzystac z tego samego pliku konfiguracyjnego z pelnym wsparciem watkow.
  n_workers: 4

  # --- Wagi celow (po normalizacji wzgledem trajektorii referencyjnej) ---
  # Cele sa dzielone przez F_ref (wartosc F dla linii prostej Start->Target),
  # wiec wagi operuja na bezwymiarowej skali ~1.0.
  # Przyklad: w_collision_risk = 5.0 oznacza "kolizja 5x wazniejsza niz dlugosc trasy".
  w_path_length: 0.05       # F1: dlugosc trasy (znormalizowana)
  w_collision_risk: 10.0     # F2: ryzyko kolizji (znormalizowane; F2_ref czesto ~1.0)
  w_elevation: 0.1          # F3: zmiany wysokosci (znormalizowane)

  # --- Kara za naruszenia ograniczen ---
  # Suma naruszen G1..G5 pomnozona przez penalty_weight.
  # Wysoka wartosc (100+) wymusza feasibility; niska pozwala na eksploracje.
  penalty_weight: 2.0

  # --- Parametry VectorizedEvaluator (wspoldzielone z NSGA-III) ---
  min_dist: 1.5
  ignore_ratio: 0.4
  safety_margin: 1.5
  uniformity_std: 50.0
  max_jerk: 50.0
