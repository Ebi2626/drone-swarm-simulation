# Parametry specyficzne dla Sparrow Search Algorithm (SSA, Xue & Shen 2020).
# Schemat pól zgodny z konfiguracją OOA — pozwala na porównanie ceteris paribus.
algorithm_params:
  cruise_speed: 6.0
  pop_size: 1000
  epochs: 200
  n_inner_waypoints: 11
  seed: 42

  # --- Parametry biologiczne SSA (paper Xue & Shen 2020) ---
  # ST  ∈ [0.5, 1.0]  — safety threshold; R2 < ST ⇒ producer wide-search,
  #                     R2 ≥ ST ⇒ rapid escape do bezpieczniejszej pozycji.
  # PD  ∈ (0, 1)      — udział producentów (paper'owe ref.: 0.2 = 20%).
  # SD  ∈ (0, 1)      — udział "świadomych zagrożenia" (paper'owe ref.: 0.1 = 10%).
  ST: 0.8
  PD: 0.2
  SD: 0.1

  # --- Wagi celów (po normalizacji względem trajektorii referencyjnej) ---
  # Cele są dzielone przez F_ref (wartość F dla linii prostej Start→Target),
  # więc wagi operują na bezwymiarowej skali ~1.0.
  w_path_length: 0.05       # F1: długość trasy (znormalizowana)
  w_collision_risk: 1.2     # F2: ryzyko kolizji (znormalizowane; F2_ref często ~1.0)
  w_elevation: 0.1          # F3: zmiany wysokości (znormalizowane)

  # --- Kara za naruszenia ograniczeń ---
  # Weakest-link: największe pojedyncze naruszenie G[j] (np.max, nie np.sum)
  # mnożone przez ten współczynnik. Wartość ujednolicona z OOA dla porównania
  # ceteris paribus.
  penalty_weight: 2.0

  # --- VectorizedEvaluator (ograniczenia kinematyczne / separacja / kolizje) ---
  # Nazwy zgodne z odczytami w objective_constrains.VectorizedEvaluator.
  obstacle_safety_margin: 3.0     # bufor wokół przeszkód [m]
  min_drone_distance: 2.0         # min. odległość inter-drone na węzłach kontrolnych [m]
  k_factor: 2.0                   # mnożnik dynamicznego limitu dystansu między węzłami
  absolute_min_node_dist: 2.0     # dolny próg dystansu między węzłami [m]
  max_accel_limit: 2.0            # limit „drugiej różnicy” wielokąta kontrolnego

  # --- Szum inicjalizacji populacji (anizotropowy) ---
  noise_std_xy: 2.0
  noise_std_z: 0.3
